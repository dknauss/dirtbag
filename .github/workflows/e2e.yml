name: E2E

# Boots WordPress 7.0 in WordPress Playground with the theme + seeded demo
# content, then runs the Playwright smoke + accessibility suite against it.
#
# NOTE: this harness has not been executed in the authoring environment (no
# Node/browser there). Treat the first CI run as the shakedown — the Playground
# CLI flags and the axe baseline (real a11y findings) may need a tweak.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Pin the CI blueprint to this commit
        run: sed "s/__REF__/${{ github.event.pull_request.head.sha || github.sha }}/" tests/blueprint.json > tests/blueprint.ci.json

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Boot WordPress Playground (theme + seeded content)
        run: |
          npx @wp-playground/cli@latest server --port 9400 --blueprint=tests/blueprint.ci.json &
          # Wait until the homepage actually renders seeded featured-image
          # content (the wp-post-image class), not just returns 200. A bare 200
          # can precede the seed import, leaving the front page imageless and
          # flaking the JS-off "images remain plain images" check.
          seeded=
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9400/ | grep -q wp-post-image; then seeded=1; break; fi
            sleep 2
          done
          if [ -z "$seeded" ]; then
            echo "::error::Seeded content (wp-post-image) never appeared after 120s; aborting so the suite does not run against an unseeded site."
            exit 1
          fi

      - name: Run Playwright (smoke + accessibility)
        working-directory: tests
        run: npm test
        env:
          DIRTBAG_BASE_URL: http://127.0.0.1:9400

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7

  # Per-style accessibility sweep — axe (with color-contrast gated) against each
  # style variation. Playground is in-memory with no persistent wp-cli, so each
  # style gets its own boot: the blueprint applies the variation at boot via
  # playground/apply-style.php (locally this is the tests/axe-styles.sh loop).
  e2e-styles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        style: [default, terminal, amber-crt, blueprint, hi-vis, minimalist, newspaper]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate per-style CI blueprint
        env:
          REF: ${{ github.event.pull_request.head.sha || github.sha }}
          STYLE: ${{ matrix.style }}
        run: node tests/ci-style-blueprint.mjs > tests/blueprint.ci.json

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Boot WordPress Playground (theme + seed + style)
        run: |
          npx @wp-playground/cli@latest server --port 9400 --blueprint=tests/blueprint.ci.json &
          # Wait until the homepage actually renders seeded featured-image
          # content (the wp-post-image class), not just returns 200. A bare 200
          # can precede the seed import, leaving the front page imageless and
          # flaking the JS-off "images remain plain images" check.
          seeded=
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9400/ | grep -q wp-post-image; then seeded=1; break; fi
            sleep 2
          done
          if [ -z "$seeded" ]; then
            echo "::error::Seeded content (wp-post-image) never appeared after 120s; aborting so the suite does not run against an unseeded site."
            exit 1
          fi

      - name: Run per-style axe sweep
        working-directory: tests
        run: npx playwright test --config playwright.styles.config.js
        env:
          DIRTBAG_BASE_URL: http://127.0.0.1:9400
          DIRTBAG_STYLE: ${{ matrix.style }}

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ matrix.style }}
          path: tests/playwright-report
          retention-days: 7
