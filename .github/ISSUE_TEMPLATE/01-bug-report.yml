name: Bug Report
description: Report a reproducible Dirtbag theme bug.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Dirtbag. Please include enough detail to reproduce the issue in a clean WordPress install when possible.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What part of the theme is affected?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the behavior.
      placeholder: |
        1. Activate Dirtbag.
        2. Go to Appearance → Editor → ...
        3. Change ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include WordPress, PHP, Dirtbag, browser, and hosting/local environment versions.
      placeholder: |
        - WordPress:
        - PHP:
        - Dirtbag:
        - Browser:
        - Environment: WordPress Playground / Studio / Local / other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Templates or template parts
        - Patterns
        - Style variations or theme.json
        - Accessibility
        - WordPress.org package/review
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag images here if the issue is visual.
    validations:
      required: false
