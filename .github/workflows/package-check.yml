name: Package Check

on:
  push:
  pull_request:
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
          coverage: none

      - name: Run package check
        run: bin/package-check
