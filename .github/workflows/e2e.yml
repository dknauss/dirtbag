name: E2E

# Boots WordPress 7.0 in WordPress Playground with the theme + seeded demo
# content, then runs the Playwright smoke + accessibility suite against it.
#
# NOTE: this harness has not been executed in the authoring environment (no
# Node/browser there). Treat the first CI run as the shakedown — the Playground
# CLI flags and the axe baseline (real a11y findings) may need a tweak.

on:
  # Skip the Playground browser suite for docs-only changes: prose, planning
  # notes, and patch artifacts can't affect what the theme renders, and the
  # Playground CLI is flaky enough that running it on docs adds noise, not
  # signal. A change touching any non-doc path still triggers the full suite.
  # (These checks are not required, so skipping never blocks a merge.)
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.planning/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '.planning/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Pin the CI blueprint to this commit
        run: sed "s/__REF__/${{ github.event.pull_request.head.sha || github.sha }}/" tests/blueprint.json > tests/blueprint.ci.json

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Boot WordPress Playground (theme + seeded content)
        run: |
          # Pinned, not @latest: the Playground CLI has an intermittent EBADF /
          # connection-refused crash that almost always strikes at boot. Pin a
          # known build and retry the boot — a clean boot then runs reliably.
          boot() {
            npx @wp-playground/cli@3.1.41 server --port 9400 --blueprint=tests/blueprint.ci.json &
            echo $! > /tmp/pg.pid
            # Ready only when the homepage renders the seeded featured image (a
            # bare 200 can precede the seed import). Bail early if the server died.
            for i in $(seq 1 60); do
              if curl -sf http://127.0.0.1:9400/ | grep -q wp-post-image; then return 0; fi
              kill -0 "$(cat /tmp/pg.pid)" 2>/dev/null || return 1
              sleep 2
            done
            return 1
          }
          for attempt in 1 2 3; do
            echo "::group::Playground boot attempt $attempt"
            if boot; then echo "seeded after attempt $attempt"; echo "::endgroup::"; exit 0; fi
            echo "boot attempt $attempt failed (EBADF/timeout); retrying" >&2
            echo "::endgroup::"
            kill "$(cat /tmp/pg.pid)" 2>/dev/null || true
            pkill -f "@wp-playground/cli" 2>/dev/null || true
            sleep 3
          done
          echo "::error::Playground failed to boot (wp-post-image) after 3 attempts; aborting so the suite does not run against an unseeded site."
          exit 1

      - name: Run Playwright (smoke + accessibility)
        working-directory: tests
        run: npm test
        env:
          DIRTBAG_BASE_URL: http://127.0.0.1:9400

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7

  # Per-style accessibility sweep — axe (with color-contrast gated) against each
  # style variation. Playground is in-memory with no persistent wp-cli, so each
  # style gets its own boot: the blueprint applies the variation at boot via
  # playground/apply-style.php (locally this is the tests/axe-styles.sh loop).
  e2e-styles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        style: [default, terminal, amber-crt, blueprint, hi-vis, minimalist, newspaper]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate per-style CI blueprint
        env:
          REF: ${{ github.event.pull_request.head.sha || github.sha }}
          STYLE: ${{ matrix.style }}
        run: node tests/ci-style-blueprint.mjs > tests/blueprint.ci.json

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Boot WordPress Playground (theme + seed + style)
        run: |
          # Pinned, not @latest: the Playground CLI has an intermittent EBADF /
          # connection-refused crash that almost always strikes at boot. Pin a
          # known build and retry the boot — a clean boot then runs reliably.
          boot() {
            npx @wp-playground/cli@3.1.41 server --port 9400 --blueprint=tests/blueprint.ci.json &
            echo $! > /tmp/pg.pid
            # Ready only when the homepage renders the seeded featured image (a
            # bare 200 can precede the seed import). Bail early if the server died.
            for i in $(seq 1 60); do
              if curl -sf http://127.0.0.1:9400/ | grep -q wp-post-image; then return 0; fi
              kill -0 "$(cat /tmp/pg.pid)" 2>/dev/null || return 1
              sleep 2
            done
            return 1
          }
          for attempt in 1 2 3; do
            echo "::group::Playground boot attempt $attempt"
            if boot; then echo "seeded after attempt $attempt"; echo "::endgroup::"; exit 0; fi
            echo "boot attempt $attempt failed (EBADF/timeout); retrying" >&2
            echo "::endgroup::"
            kill "$(cat /tmp/pg.pid)" 2>/dev/null || true
            pkill -f "@wp-playground/cli" 2>/dev/null || true
            sleep 3
          done
          echo "::error::Playground failed to boot (wp-post-image) after 3 attempts; aborting so the suite does not run against an unseeded site."
          exit 1

      - name: Run per-style axe sweep
        working-directory: tests
        run: npx playwright test --config playwright.styles.config.js
        env:
          DIRTBAG_BASE_URL: http://127.0.0.1:9400
          DIRTBAG_STYLE: ${{ matrix.style }}

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ matrix.style }}
          path: tests/playwright-report
          retention-days: 7
