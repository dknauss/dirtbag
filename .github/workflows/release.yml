name: Release

# Builds a clean theme ZIP on every v* tag and attaches it to the GitHub
# Release under a FIXED asset name (dirtbag.zip). That makes
#   https://github.com/dknauss/dirtbag/releases/latest/download/dirtbag.zip
# a stable, always-latest URL — so the Playground "stable" demo can install
# from it (via the CORS proxy) and never needs a per-release tag bump.
#
# The archive contents are defined by the `export-ignore` rules in
# .gitattributes (git archive honours them), and validated by bin/package-check.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches theme version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STYLE_VERSION="$(grep -m1 -iE '^\s*Version:' style.css | sed -E 's/.*Version:[[:space:]]*//')"
          echo "tag=$VERSION style.css=$STYLE_VERSION"
          test "$VERSION" = "$STYLE_VERSION"

      - name: Package hygiene check
        run: bash bin/package-check

      - name: Build theme ZIP (honours .gitattributes export-ignore)
        run: |
          git archive --format=zip --prefix=dirtbag/ -o dirtbag.zip HEAD
          unzip -tq dirtbag.zip

      - name: Create GitHub Release + attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: dirtbag.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
